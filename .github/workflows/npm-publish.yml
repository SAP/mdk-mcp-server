name: Release

permissions:
  contents: write
  id-token: write

on:
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    environment: npmjs:@sap/mdk-mcp-server
    steps:
      # actions/checkout@v5
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      # actions/setup-node@v5
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - name: Check npm version
        run: |
          echo "Current npm version: $(npm --version)"
          echo "Latest npm version: $(npx npm@latest --version)"
      # jacobtomlinson/gha-find-replace@v3.0.4
      - name: Set instrumentation key in mdk-mcp-server
        uses: jacobtomlinson/gha-find-replace@dfbfef71bc27c27c39d89534540a8960e0eee6b0
        with:
          include: build/telemetry/index.js
          find: 'ApplicationInsightsInstrumentationKeyPLACEH0LDER'
          replace: ${{ secrets.INSTRUMENTATION_KEY }}
          regex: false
      - name: run tests
        run: npm ci
      # martinbeentjes/npm-get-version-action@v1.3.1
      - name: get version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@3cf273023a0dda27efcd3164bdfb51908dd46a5b
      - name: check versions
        run: |
          version_in_server_json=$(jq -r '.packages[0].version' server.json)
          if [ "$version_in_server_json" != "${{ steps.package-version.outputs.current-version }}" ]; then
            echo "Version in server.json ($version_in_server_json) does not match package.json (${{
              steps.package-version.outputs.current-version
            }})"
            exit 1
          fi
          version_in_plugin_json=$(jq -r '.version' .claude-plugin/plugin.json)
          if [ "$version_in_plugin_json" != "${{ steps.package-version.outputs.current-version }}" ]; then
            echo "Version in .claude-plugin/plugin.json ($version_in_plugin_json) does not match package.json (${{
              steps.package-version.outputs.current-version
            }})"
            exit 1
          fi
      # schwma/parse-changelog-action@v1.0.0
      - name: parse changelog
        id: parse-changelog
        uses: schwma/parse-changelog-action@51281ae71f93dc715a18110de791d3ae8a74338d
        with:
          version: '${{ steps.package-version.outputs.current-version }}'
      # ncipollo/release-action@v1.14.0
      - name: create a GitHub release
        uses: ncipollo/release-action@2c591bcc8ecdcd2db72b97d6147f871fcd833ba5
        with:
          tag: 'v${{ steps.package-version.outputs.current-version }}'
          body: '${{ steps.parse-changelog.outputs.body }}'
      - run: npx npm@latest publish --access public
      - name: Download MCP Publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Publish to MCP Registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
